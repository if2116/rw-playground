name: Deploy Static Site

on:
  workflow_dispatch:
  push:
    branches:
      - main

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Resolve base path for GitHub Pages
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_SITE="${GITHUB_REPOSITORY_OWNER}.github.io"
          echo "STATIC_EXPORT=1" >> "$GITHUB_ENV"
          if [ "$REPO_NAME" = "$OWNER_SITE" ]; then
            echo "NEXT_BASE_PATH=" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "NEXT_BASE_PATH=/$REPO_NAME" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_BASE_PATH=/$REPO_NAME" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Export static data
        run: npm run export-static-data

      - name: Build static site
        run: npm run build

      - name: Validate exported arena content
        run: |
          node -e "const fs=require('fs'); const p='public/data/arena-content.json'; if(!fs.existsSync(p)){throw new Error('missing '+p);} const d=JSON.parse(fs.readFileSync(p,'utf8')); const ids=Object.keys(d); const full=ids.filter(id=>{const zh=d[id]?.zh||{}; return zh.overview&&zh.implementation&&zh['tech-configuration'];}); console.log('arena total=',ids.length,'full zh tabs=',full.length); if(full.length<3){throw new Error('too few arenas with full tab content: '+full.length);}"

      - name: Disable Jekyll
        run: touch out/.nojekyll

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
