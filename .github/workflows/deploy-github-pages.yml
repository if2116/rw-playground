name: Deploy GitHub Pages Site

on:
  workflow_dispatch:

concurrency:
  group: github-pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set base path for GitHub Pages site
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"
          OWNER_SITE="${GITHUB_REPOSITORY_OWNER}.github.io"
          echo "STATIC_EXPORT=1" >> "$GITHUB_ENV"
          if [ "$REPO_NAME" = "$OWNER_SITE" ]; then
            echo "NEXT_BASE_PATH=" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_BASE_PATH=" >> "$GITHUB_ENV"
          else
            echo "NEXT_BASE_PATH=/$REPO_NAME" >> "$GITHUB_ENV"
            echo "NEXT_PUBLIC_BASE_PATH=/$REPO_NAME" >> "$GITHUB_ENV"
          fi

      - name: Install dependencies
        run: npm ci

      - name: Export static data
        run: npm run export-static-data

      - name: Build static site
        run: npm run build

      - name: Prepare GitHub Pages artifact
        run: |
          touch out/.nojekyll

      - name: Upload static artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
